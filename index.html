<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/svg-with-js.css" integrity="sha512-B8mxQtSQZ50b1VZPXf8GYjqx22oeiOyI47awH8Ak5kQu/6puXd/YBzmzQUMmYqu/k88IHcG7SVOZ6329l0kN7Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="header" style="position: fixed; background-color: white; width: 78%; z-index: 1; padding-top: -40px;">
            <div class="navbar1">
                    <div class="twobutton">
                        <div class="logo">
                            <img src="https://rukminim1.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=60" alt="Flipkart Logo">
                            <i>Flipkart</i>
                        </div>
                        <div class="travel">
                            <img src="https://rukminim1.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=60" alt="Travel Logo">
                            <i>Travel</i>
                        </div>
                    </div>
                    <div class="location">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Location Not Set</span>
                        <span style="color: #1254E7; margin-left: -20px;">Select your location > </span>
                    </div>
                </div>
                <div class="navbar2">
                    <div class="search">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search here for your Product, Accessories, Fashion and More" >
                    </div>
                    <div class="profilecart">
                            <i class="fa-solid fa-circle-user" id="user" style="margin-left: -10px; margin-right: -30px;"></i>
                            <span style="margin-right: 0;">Login</span>
                            <span>More</span>
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="cart" style="margin-left: -20px;">Cart</span>
                    </div>
                </div>
                <hr>
                <div class="navbar3">
                    <div><a href="">For_You</a></div>
                    <div><a href="">Fashion</a></div>
                    <div><a href="">Mobiles</a></div>
                    <div><a href="">Electronics</a></div>
                    <div><a href="">Beauty</a></div>
                    <div><a href="">Home</a></div>
                    <div><a href="">Appliances</a></div>
                    <div><a href="">Toys</a></div>
                    <div><a href="">Food</a></div>
                    <div><a href="">Furniture</a></div>
                </div>
                <hr>
        </div>
        <div class="main">
            <div class="threecards">
                <div class="card1">
                    <img src="https://rukminim1.flixcart.com/fk-p-flap/3200/1560/image/2278a26e7a3719ec.png?q=60" alt="Card 1">
                </div>
                <div class="card2">
                    <img src="https://rukminim1.flixcart.com/fk-p-flap/3200/1560/image/0f21bb28e8a3d58a.jpg?q=60" alt="Card 2">
                </div>
                <div class="card3">
                    <img src="https://rukminim1.flixcart.com/fk-p-flap/3200/1560/image/4b12532ac7cc964c.png?q=60" alt="Card 3">
                </div>
            </div>
            <div class="indemand">
                <div>
                    <h2 style="font-weight: 600; margin-left: -30px; padding-top: 15px;">In demand</h2>
                    <div class="indemandcards">
                        <div class="idcard1">
                            <div class="idcd1img1">
                                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/t-shirt/b/r/b/m-acid-otshirt-beefits-original-imahdsfhyacxzqcu.jpeg?q=70" alt="" height="200px" width="80% ">
                                <p><b>Printed T-Shirt</b></p>
                                <p><b>Just for ₹999</b></p>
                            </div>
                        </div>
                        <div class="idcard2">
                            <div class="idcd2img2">
                                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/t-shirt/b/r/b/m-acid-otshirt-beefits-original-imahdsfhyacxzqcu.jpeg?q=70" alt="" height="200px" width="80%">
                                <p><b>Printed T-Shirt</b></p>
                                <p><b>Just for ₹999</b></p>
                            </div>
                        </div>
                        <div class="idcard3">
                            <div class="idcd3img3">
                                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/t-shirt/b/r/b/m-acid-otshirt-beefits-original-imahdsfhyacxzqcu.jpeg?q=70" alt="" height="200px" width="80%">
                                <p><b>Printed T-Shirt</b></p>
                                <p><b>Just for ₹999</b></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="suggested">
                <h2>Suggested for You</h2>
            </div>
        </div> 
    </div>
</body>
</html>
